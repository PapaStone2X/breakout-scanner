<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10Y Consolidation Breakout Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const SECTORS = ["All", "Technology", "Health Care", "Financials", "Energy", "Consumer Discretionary", "Industrials", "Materials", "Utilities", "Real Estate", "Communication Services", "Consumer Staples"];

    const SCAN_DATA = {
      scan_time: "2026-02-24T14:25:30.575904",
      params: {
        universe: "sp500",
        lookback_years: 10,
        stale_threshold_days: 252,
        recency_days: 5,
        tickers_scanned: 503,
        tickers_downloaded: 503,
      },
      results: [
        { ticker: "EQIX", name: "Equinix", sector: "Real Estate", price: 945.64, ten_year_high: 962.92, ten_year_low: 218.4, signal: "near_high", level: 962.92, level_date: "2024-12-06", days_stale: 296, pct_from_level: 1.79, volume: 665100, avg_volume_20d: 752325 },
        { ticker: "MRK", name: "Merck & Co.", sector: "Health Care", price: 123.82, ten_year_high: 126.28, ten_year_low: 34.04, signal: "near_high", level: 126.28, level_date: "2024-06-24", days_stale: 412, pct_from_level: 1.95, volume: 9660400, avg_volume_20d: 13448305 },
      ],
      summary: {
        breakout_highs: 0,
        breakout_lows: 0,
        near_highs: 2,
        near_lows: 0,
      },
    };

    const formatNumber = (n) => {
      if (!n) return "\u2014";
      if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return n.toString();
    };

    const daysBetween = (dateStr) => {
      if (!dateStr) return null;
      const d = new Date(dateStr);
      const now = new Date();
      return Math.floor((now - d) / 86400000);
    };

    const VolBar = ({ current, average }) => {
      if (!current || !average) return <span style={{ color: "#4b5563", fontSize: 11 }}>{"\u2014"}</span>;
      const ratio = current / average;
      const width = Math.min(ratio / 3 * 100, 100);
      const color = ratio > 2 ? "#22d3ee" : ratio > 1.3 ? "#818cf8" : "#4b5563";
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 60, height: 6, background: "#1e1e2e", borderRadius: 3, overflow: "hidden" }}>
            <div style={{ width: `${width}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.4s ease" }} />
          </div>
          <span style={{ fontSize: 11, color: ratio > 1.5 ? "#22d3ee" : "#6b7280", fontVariantNumeric: "tabular-nums" }}>
            {ratio.toFixed(1)}x
          </span>
        </div>
      );
    };

    const Badge = ({ signal }) => {
      const config = {
        breakout_high: { label: "\u25B2 BREAKOUT HIGH", bg: "#052e16", border: "#16a34a", color: "#4ade80" },
        breakout_low: { label: "\u25BC BREAKOUT LOW", bg: "#2a0a0a", border: "#dc2626", color: "#f87171" },
        near_high: { label: "\u25C6 NEAR HIGH", bg: "#1a1a00", border: "#a16207", color: "#fbbf24" },
        near_low: { label: "\u25C7 NEAR LOW", bg: "#1a0a00", border: "#92400e", color: "#fb923c" },
      };
      const c = config[signal] || { label: "\u2014", bg: "#111827", border: "#374151", color: "#6b7280" };
      return (
        <span style={{
          display: "inline-block", padding: "3px 8px", fontSize: 10,
          fontWeight: 700, letterSpacing: "0.08em",
          fontFamily: "'JetBrains Mono', 'SF Mono', monospace",
          background: c.bg, border: `1px solid ${c.border}`, borderRadius: 4, color: c.color,
        }}>
          {c.label}
        </span>
      );
    };

    const SortIcon = ({ active, dir }) => (
      <span style={{ marginLeft: 4, fontSize: 10, opacity: active ? 1 : 0.3 }}>
        {active ? (dir === "asc" ? "\u25B2" : "\u25BC") : "\u21C5"}
      </span>
    );

    function Dashboard() {
      const [data] = useState(SCAN_DATA);
      const [filter, setFilter] = useState("all");
      const [sector, setSector] = useState("All");
      const [sortCol, setSortCol] = useState("pctMove");
      const [sortDir, setSortDir] = useState("desc");
      const [search, setSearch] = useState("");
      const [selectedTicker, setSelectedTicker] = useState(null);

      const handleSort = (col) => {
        if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortCol(col); setSortDir("desc"); }
      };

      const filtered = useMemo(() => {
        let d = [...data.results];
        if (filter === "breakouts") d = d.filter(s => s.signal === "breakout_high" || s.signal === "breakout_low");
        else if (filter === "high") d = d.filter(s => s.signal === "breakout_high");
        else if (filter === "low") d = d.filter(s => s.signal === "breakout_low");
        else if (filter === "near") d = d.filter(s => s.signal === "near_high" || s.signal === "near_low");
        if (sector !== "All") d = d.filter(s => s.sector === sector);
        if (search) {
          const q = search.toUpperCase();
          d = d.filter(s => s.ticker.includes(q) || s.name.toUpperCase().includes(q));
        }
        d.sort((a, b) => {
          let va, vb;
          switch (sortCol) {
            case "ticker": va = a.ticker; vb = b.ticker; return sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
            case "price": va = a.price; vb = b.price; break;
            case "volume": va = a.volume || 0; vb = b.volume || 0; break;
            case "volRatio": va = (a.volume || 0) / (a.avg_volume_20d || 1); vb = (b.volume || 0) / (b.avg_volume_20d || 1); break;
            case "days_stale": va = a.days_stale || 0; vb = b.days_stale || 0; break;
            case "breakout_date": va = a.breakout_date ? new Date(a.breakout_date).getTime() : 0; vb = b.breakout_date ? new Date(b.breakout_date).getTime() : 0; break;
            case "pctMove": va = a.pct_above ?? a.pct_below ?? a.pct_from_level ?? 0; vb = b.pct_above ?? b.pct_below ?? b.pct_from_level ?? 0; break;
            default: va = 0; vb = 0;
          }
          if (typeof va === "number") return sortDir === "asc" ? va - vb : vb - va;
          return 0;
        });
        return d;
      }, [data, filter, sector, sortCol, sortDir, search]);

      const counts = useMemo(() => ({
        breakout_high: data.results.filter(s => s.signal === "breakout_high").length,
        breakout_low: data.results.filter(s => s.signal === "breakout_low").length,
        near_high: data.results.filter(s => s.signal === "near_high").length,
        near_low: data.results.filter(s => s.signal === "near_low").length,
      }), [data]);

      const selectedStock = selectedTicker ? data.results.find(s => s.ticker === selectedTicker) : null;
      const scanDate = new Date(data.scan_time).toLocaleString();

      return (
        <div style={{
          minHeight: "100vh", background: "#0a0a0f", color: "#e5e7eb",
          fontFamily: "'JetBrains Mono', 'SF Mono', 'Fira Code', monospace",
        }}>
          {/* Header */}
          <div style={{
            borderBottom: "1px solid #1a1a2e", padding: "16px 24px",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            background: "linear-gradient(180deg, #0f0f1a 0%, #0a0a0f 100%)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <div style={{
                width: 8, height: 8, borderRadius: "50%", background: "#4ade80",
                boxShadow: "0 0 8px #4ade8066", animation: "pulse 2s infinite",
              }} />
              <div>
                <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: "0.04em", color: "#f8fafc" }}>
                  10Y CONSOLIDATION BREAKOUT SCANNER
                </div>
                <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2, letterSpacing: "0.1em" }}>
                  S&P 500 &bull; 10-YEAR HIGH/LOW STALE &ge;1YR &bull; BROKEN IN LAST 5 DAYS
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <div style={{ fontSize: 10, color: "#4b5563", letterSpacing: "0.05em" }}>
                {data.params.tickers_scanned} TICKERS &bull; {scanDate}
              </div>
              <div style={{
                padding: "4px 10px", borderRadius: 4, fontSize: 10,
                background: "#0f172a", border: "1px solid #1e3a5f", color: "#60a5fa",
                letterSpacing: "0.05em",
              }}>
                LIVE DATA
              </div>
            </div>
          </div>

          {/* Stats */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 1, background: "#1a1a2e" }}>
            {[
              { label: "BREAKOUT HIGHS", value: counts.breakout_high, color: "#4ade80", sub: "10Y high broken after 1yr+ stale" },
              { label: "BREAKOUT LOWS", value: counts.breakout_low, color: "#f87171", sub: "10Y low broken after 1yr+ stale" },
              { label: "NEAR HIGHS", value: counts.near_high, color: "#fbbf24", sub: "Within 2% of stale 10Y high" },
              { label: "NEAR LOWS", value: counts.near_low, color: "#fb923c", sub: "Within 2% of stale 10Y low" },
              { label: "TOTAL SIGNALS", value: data.results.length, color: "#818cf8", sub: `of ${data.params.tickers_scanned} scanned` },
            ].map(({ label, value, color, sub }) => (
              <div key={label} style={{ padding: "16px 24px", background: "#0a0a0f" }}>
                <div style={{ fontSize: 9, color: "#6b7280", letterSpacing: "0.12em", marginBottom: 6 }}>{label}</div>
                <div style={{ fontSize: 28, fontWeight: 700, color, lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>{value}</div>
                <div style={{ fontSize: 9, color: "#4b5563", marginTop: 6, letterSpacing: "0.02em" }}>{sub}</div>
              </div>
            ))}
          </div>

          {/* Controls */}
          <div style={{
            padding: "12px 24px", display: "flex", gap: 12, alignItems: "center",
            borderBottom: "1px solid #1a1a2e", flexWrap: "wrap",
          }}>
            <div style={{ display: "flex", gap: 2, background: "#111827", borderRadius: 6, padding: 2 }}>
              {[
                { key: "breakouts", label: "Breakouts" },
                { key: "high", label: "\u25B2 Highs" },
                { key: "low", label: "\u25BC Lows" },
                { key: "near", label: "\u25C6 Near" },
                { key: "all", label: "All Signals" },
              ].map(({ key, label }) => (
                <button key={key} onClick={() => setFilter(key)} style={{
                  padding: "6px 14px", border: "none", borderRadius: 4,
                  background: filter === key ? "#1e293b" : "transparent",
                  color: filter === key ? "#f8fafc" : "#6b7280",
                  fontSize: 11, fontFamily: "inherit", cursor: "pointer",
                  fontWeight: filter === key ? 600 : 400, transition: "all 0.15s ease",
                  letterSpacing: "0.02em",
                }}>
                  {label}
                </button>
              ))}
            </div>

            <select value={sector} onChange={e => setSector(e.target.value)} style={{
              padding: "6px 12px", background: "#111827", border: "1px solid #1e293b",
              borderRadius: 4, color: "#e5e7eb", fontSize: 11, fontFamily: "inherit", cursor: "pointer",
            }}>
              {SECTORS.map(s => <option key={s} value={s}>{s}</option>)}
            </select>

            <input type="text" placeholder="Search ticker or name..." value={search}
              onChange={e => setSearch(e.target.value)} style={{
                padding: "6px 12px", background: "#111827", border: "1px solid #1e293b",
                borderRadius: 4, color: "#e5e7eb", fontSize: 11, fontFamily: "inherit", width: 200, outline: "none",
              }}
            />
            <div style={{ marginLeft: "auto", fontSize: 10, color: "#4b5563" }}>
              {filtered.length} result{filtered.length !== 1 ? "s" : ""}
            </div>
          </div>

          {/* Table */}
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ borderBottom: "1px solid #1a1a2e" }}>
                  {[
                    { key: "ticker", label: "TICKER", w: 120 },
                    { key: null, label: "SIGNAL", w: 150 },
                    { key: "price", label: "PRICE", w: 90 },
                    { key: "pctMove", label: "% MOVE", w: 80 },
                    { key: null, label: "LEVEL", w: 100 },
                    { key: null, label: "LEVEL SET", w: 100 },
                    { key: "days_stale", label: "DAYS STALE", w: 95 },
                    { key: "breakout_date", label: "BREAKOUT", w: 100 },
                    { key: "volume", label: "VOLUME", w: 90 },
                    { key: "volRatio", label: "VOL RATIO", w: 100 },
                  ].map(({ key, label, w }) => (
                    <th key={label} onClick={key ? () => handleSort(key) : undefined} style={{
                      padding: "10px 12px", textAlign: "left", fontSize: 9, color: "#6b7280",
                      letterSpacing: "0.12em", fontWeight: 600, cursor: key ? "pointer" : "default",
                      userSelect: "none", width: w, whiteSpace: "nowrap", background: "#06060b",
                      position: "sticky", top: 0, zIndex: 1,
                    }}>
                      {label}{key && <SortIcon active={sortCol === key} dir={sortDir} />}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((stock, idx) => {
                  const isHigh = stock.signal === "breakout_high" || stock.signal === "near_high";
                  const isSelected = selectedTicker === stock.ticker;
                  const rowBg = isSelected ? "#111827" : idx % 2 === 0 ? "#0a0a0f" : "#0c0c14";
                  const pctVal = stock.pct_above ?? stock.pct_below ?? stock.pct_from_level ?? 0;

                  return (
                    <tr key={stock.ticker}
                      onClick={() => setSelectedTicker(isSelected ? null : stock.ticker)}
                      style={{ borderBottom: "1px solid #111827", background: rowBg, cursor: "pointer", transition: "background 0.1s ease" }}
                      onMouseEnter={e => { if (!isSelected) e.currentTarget.style.background = "#111827"; }}
                      onMouseLeave={e => { if (!isSelected) e.currentTarget.style.background = rowBg; }}
                    >
                      <td style={{ padding: "10px 12px" }}>
                        <div style={{ fontWeight: 700, color: "#f8fafc", fontSize: 13 }}>{stock.ticker}</div>
                        <div style={{ fontSize: 9, color: "#6b7280", marginTop: 1, maxWidth: 110, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {stock.name}
                        </div>
                      </td>
                      <td style={{ padding: "10px 12px" }}><Badge signal={stock.signal} /></td>
                      <td style={{
                        padding: "10px 12px", fontWeight: 600, fontVariantNumeric: "tabular-nums",
                        color: stock.signal === "breakout_high" ? "#4ade80" : stock.signal === "breakout_low" ? "#f87171" : "#e5e7eb",
                      }}>
                        ${stock.price.toFixed(2)}
                      </td>
                      <td style={{
                        padding: "10px 12px", fontVariantNumeric: "tabular-nums", fontSize: 11,
                        color: isHigh ? "#4ade80" : "#f87171",
                      }}>
                        {isHigh ? `+${pctVal}%` : `-${pctVal}%`}
                      </td>
                      <td style={{ padding: "10px 12px", fontVariantNumeric: "tabular-nums", fontSize: 11, color: "#9ca3af" }}>
                        ${stock.level.toFixed(2)}
                      </td>
                      <td style={{ padding: "10px 12px", fontSize: 11, color: "#6b7280" }}>
                        {stock.level_date}
                      </td>
                      <td style={{ padding: "10px 12px", fontVariantNumeric: "tabular-nums" }}>
                        <span style={{
                          color: stock.days_stale > 500 ? "#e879f9" : stock.days_stale > 365 ? "#c084fc" : "#818cf8",
                          fontWeight: 600,
                        }}>
                          {stock.days_stale}d
                        </span>
                        {stock.days_stale > 500 && (
                          <span style={{ fontSize: 9, color: "#a855f7", marginLeft: 4 }}>
                            ({(stock.days_stale / 252).toFixed(1)}yr)
                          </span>
                        )}
                      </td>
                      <td style={{ padding: "10px 12px", fontVariantNumeric: "tabular-nums" }}>
                        {stock.breakout_date ? (
                          <span style={{
                            color: daysBetween(stock.breakout_date) <= 1 ? "#fbbf24" : "#9ca3af",
                            fontWeight: daysBetween(stock.breakout_date) <= 1 ? 700 : 400,
                          }}>
                            {stock.breakout_date}
                          </span>
                        ) : (
                          <span style={{ color: "#4b5563" }}>{"\u2014"}</span>
                        )}
                      </td>
                      <td style={{ padding: "10px 12px", fontVariantNumeric: "tabular-nums", fontSize: 11, color: "#9ca3af" }}>
                        {formatNumber(stock.volume)}
                      </td>
                      <td style={{ padding: "10px 12px" }}>
                        <VolBar current={stock.volume} average={stock.avg_volume_20d} />
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Detail Panel */}
          {selectedStock && (
            <div style={{
              margin: "0 24px 24px", padding: 20,
              background: "#0f0f1a", border: "1px solid #1a1a2e", borderRadius: 8,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                <div>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#f8fafc" }}>
                    {selectedStock.ticker} <span style={{ fontWeight: 400, color: "#6b7280", fontSize: 13 }}>&mdash; {selectedStock.name}</span>
                  </div>
                  <div style={{ fontSize: 10, color: "#6b7280", marginTop: 4, letterSpacing: "0.05em" }}>{selectedStock.sector}</div>
                </div>
                <Badge signal={selectedStock.signal} />
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 16, marginBottom: 16 }}>
                {[
                  { label: "CURRENT", value: `$${selectedStock.price.toFixed(2)}`, color: selectedStock.signal.includes("high") ? "#4ade80" : "#f87171" },
                  { label: "10Y HIGH", value: `$${selectedStock.ten_year_high.toFixed(2)}`, color: "#9ca3af" },
                  { label: "10Y LOW", value: `$${selectedStock.ten_year_low.toFixed(2)}`, color: "#9ca3af" },
                  { label: "LEVEL", value: `$${selectedStock.level.toFixed(2)}`, color: "#c084fc" },
                  { label: "DAYS STALE", value: `${selectedStock.days_stale}`, color: "#c084fc" },
                  { label: "VOL vs AVG", value: selectedStock.avg_volume_20d ? `${(selectedStock.volume / selectedStock.avg_volume_20d).toFixed(1)}x` : "\u2014", color: (selectedStock.volume / (selectedStock.avg_volume_20d || 1)) > 1.5 ? "#22d3ee" : "#9ca3af" },
                ].map(({ label, value, color }) => (
                  <div key={label}>
                    <div style={{ fontSize: 9, color: "#6b7280", letterSpacing: "0.12em", marginBottom: 4 }}>{label}</div>
                    <div style={{ fontSize: 16, fontWeight: 600, color, fontVariantNumeric: "tabular-nums" }}>{value}</div>
                  </div>
                ))}
              </div>

              {(selectedStock.signal === "breakout_high" || selectedStock.signal === "breakout_low") && (
                <div style={{
                  padding: 12, background: "#111827", borderRadius: 6,
                  fontSize: 11, color: "#9ca3af", lineHeight: 1.6,
                  borderLeft: `3px solid ${selectedStock.signal === "breakout_high" ? "#16a34a" : "#dc2626"}`,
                }}>
                  <strong style={{ color: "#f8fafc" }}>Signal:</strong> {selectedStock.ticker}'s 10-year closing {selectedStock.signal === "breakout_high" ? "high" : "low"} of ${selectedStock.level.toFixed(2)} was set on {selectedStock.level_date} &mdash; <strong style={{ color: "#c084fc" }}>{selectedStock.days_stale} trading days ago</strong> ({(selectedStock.days_stale / 252).toFixed(1)} years).
                  The stock never {selectedStock.signal === "breakout_high" ? "exceeded" : "breached"} that level until {selectedStock.breakout_date}, when it closed at ${selectedStock.breakout_close.toFixed(2)} on {((selectedStock.volume || 0) / (selectedStock.avg_volume_20d || 1)).toFixed(1)}x average volume.
                  Currently {selectedStock.pct_above ? `+${selectedStock.pct_above}%` : `-${selectedStock.pct_below}%`} beyond the level.
                </div>
              )}

              {(selectedStock.signal === "near_high" || selectedStock.signal === "near_low") && (
                <div style={{
                  padding: 12, background: "#111827", borderRadius: 6,
                  fontSize: 11, color: "#9ca3af", lineHeight: 1.6,
                  borderLeft: `3px solid ${selectedStock.signal === "near_high" ? "#a16207" : "#92400e"}`,
                }}>
                  <strong style={{ color: "#f8fafc" }}>Watchlist:</strong> {selectedStock.ticker}'s 10-year closing {selectedStock.signal === "near_high" ? "high" : "low"} of ${selectedStock.level.toFixed(2)} has been untouched since {selectedStock.level_date} ({selectedStock.days_stale} trading days).
                  Currently {selectedStock.pct_from_level}% away. A {selectedStock.signal === "near_high" ? "close above" : "close below"} ${selectedStock.level.toFixed(2)} triggers the signal.
                </div>
              )}
            </div>
          )}

          {/* Footer */}
          <div style={{
            padding: "16px 24px", borderTop: "1px solid #1a1a2e",
            fontSize: 9, color: "#4b5563", letterSpacing: "0.05em",
            display: "flex", justifyContent: "space-between",
          }}>
            <span>10Y Consolidation Breakout Scanner &bull; S&P 500</span>
            <span>10Y lookback &bull; Level stale &ge;252 trading days &bull; Breakout in last 5 days &bull; Closes only</span>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
